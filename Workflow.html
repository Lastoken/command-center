/* ─────────────────────────── Store ─────────────────────────── */

const SK = {
  projects:   'commandcenter_projects',
  decisions:  'commandcenter_decisions',
  notes:      'commandcenter_notes',
  actions:    'commandcenter_actions',
  looseTasks: 'commandcenter_loose_tasks',
  recent:     'commandcenter_recent',
  quotes:     'commandcenter_quotes',
  kinds:      'commandcenter_kinds',
};

const Store = (function () {
  function load(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return fallback;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return fallback;
      return parsed;
    } catch (e) {
      return fallback;
    }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }

  const state = {
    projects:   load(SK.projects,   DEFAULT_PROJECTS),
    decisions:  load(SK.decisions,  DEFAULT_DECISIONS),
    notes:      load(SK.notes,      DEFAULT_NOTES),
    actions:    load(SK.actions,    DEFAULT_ACTIONS),
    looseTasks: load(SK.looseTasks, DEFAULT_LOOSE_TASKS),
    recent:     load(SK.recent,     DEFAULT_RECENT),
    quotes:     load(SK.quotes,     DEFAULT_QUOTES),
    kinds:      load(SK.kinds,      DEFAULT_KINDS),
  };
  // Persist seeds on first run so subsequent reads round-trip.
  Object.keys(SK).forEach(k => save(SK[k], state[k]));

  const subs = new Set();
  const notify = () => subs.forEach(fn => fn());

  function pad2(n) { return String(n).padStart(2, '0'); }
  function todayIso() {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
  }
  function nowStamp() {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }
  function genId(prefix) {
    return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  function persist(key) { save(SK[key], state[key]); }

  function touchProject(pid) {
    if (!pid) return;
    state.projects = state.projects.map(p => p.id === pid ? { ...p, lastUpdate: nowStamp() } : p);
    persist('projects');
  }

  return {
    getState: () => state,
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    nowStamp, todayIso, genId,

    // ─────── Projects ───────
    addProject(input) {
      const max = state.projects.reduce((m, p) => {
        const n = parseInt(String(p.code || '').replace(/\D/g, ''), 10);
        return Number.isFinite(n) && n > m ? n : m;
      }, 0);
      const p = {
        id: genId('p'),
        code: input.code || `PRJ-${String(max + 1).padStart(3, '0')}`,
        name: input.name || '未命名项目',
        kind: input.kind || 'process',
        stage: input.stage || 'research',
        priority: input.priority || 'medium',
        waitingOn: input.waitingOn || 'me',
        startedAt: input.startedAt || todayIso(),
        lastUpdate: nowStamp(),
        deadline: input.deadline || null,
        summary: input.summary || '',
        tags: Array.isArray(input.tags) ? input.tags : [],
        progress: typeof input.progress === 'number' ? input.progress : 0,
        risk: input.risk || null,
        stuckDays: 0,
      };
      state.projects = [p, ...state.projects];
      persist('projects');
      notify();
      return p.id;
    },
    updateProject(id, patch) {
      state.projects = state.projects.map(p => p.id === id ? { ...p, ...patch, lastUpdate: nowStamp() } : p);
      persist('projects');
      notify();
    },
    deleteProject(id) {
      state.projects   = state.projects.filter(p => p.id !== id);
      state.decisions  = state.decisions.filter(d => d.project !== id);
      state.notes      = state.notes.filter(n => n.project !== id);
      state.actions    = state.actions.filter(a => a.project !== id);
      persist('projects'); persist('decisions'); persist('notes'); persist('actions');
      notify();
    },

    // ─────── Decisions ───────
    addDecision(input) {
      const d = {
        id: genId('d'),
        project: input.project,
        when: input.when || todayIso(),
        status: input.status || 'pending',
        title: input.title || '',
        options: Array.isArray(input.options) ? input.options : [],
        leaning: input.leaning || null,
        reasoning: input.reasoning || '',
      };
      if (input.choice) d.choice = input.choice;
      state.decisions = [d, ...state.decisions];
      persist('decisions');
      touchProject(d.project);
      notify();
      return d.id;
    },
    updateDecision(id, patch) {
      let pid = null;
      state.decisions = state.decisions.map(d => {
        if (d.id !== id) return d;
        pid = d.project;
        return { ...d, ...patch };
      });
      persist('decisions');
      touchProject(pid);
      notify();
    },
    deleteDecision(id) {
      const d = state.decisions.find(x => x.id === id);
      state.decisions = state.decisions.filter(x => x.id !== id);
      persist('decisions');
      if (d) touchProject(d.project);
      notify();
    },
    addDecisionOption(id, option) {
      let pid = null;
      state.decisions = state.decisions.map(d => {
        if (d.id !== id) return d;
        pid = d.project;
        return { ...d, options: [...(d.options || []), option] };
      });
      persist('decisions');
      touchProject(pid);
      notify();
    },
    resolveDecision(id, choice, reasoning) {
      let pid = null;
      state.decisions = state.decisions.map(d => {
        if (d.id !== id) return d;
        pid = d.project;
        return {
          ...d,
          status: 'done',
          choice,
          reasoning: reasoning != null && reasoning !== '' ? reasoning : d.reasoning,
        };
      });
      persist('decisions');
      touchProject(pid);
      notify();
    },

    // ─────── Notes ───────
    addNote(input) {
      const n = {
        id: genId('n'),
        project: input.project,
        when: input.when || nowStamp(),
        kind: input.kind || 'insight',
        title: input.title || '',
        body: input.body || '',
      };
      // linkedTo: { kind: 'action' | 'decision', id: string } — optional.
      // Stored only when present so older notes round-trip cleanly.
      if (input.linkedTo && input.linkedTo.kind && input.linkedTo.id) {
        n.linkedTo = { kind: input.linkedTo.kind, id: input.linkedTo.id };
      }
      state.notes = [n, ...state.notes];
      persist('notes');
      touchProject(n.project);
      notify();
      return n.id;
    },
    updateNote(id, patch) {
      let pid = null;
      state.notes = state.notes.map(n => {
        if (n.id !== id) return n;
        pid = (patch && patch.project) || n.project;
        return { ...n, ...patch };
      });
      persist('notes');
      touchProject(pid);
      notify();
    },
    deleteNote(id) {
      const n = state.notes.find(x => x.id === id);
      state.notes = state.notes.filter(x => x.id !== id);
      persist('notes');
      if (n) touchProject(n.project);
      notify();
    },

    // ─────── Actions ───────
    addAction(input) {
      const a = {
        id: genId('a'),
        project: input.project,
        title: input.title || '',
        due: input.due || null,
        done: !!input.done,
        waitingOn: input.waitingOn || 'me',
        priority: input.priority || 'medium',
      };
      state.actions = [...state.actions, a];
      persist('actions');
      touchProject(a.project);
      notify();
      return a.id;
    },
    updateAction(id, patch) {
      let pid = null;
      state.actions = state.actions.map(a => {
        if (a.id !== id) return a;
        pid = a.project;
        return { ...a, ...patch };
      });
      persist('actions');
      touchProject(pid);
      notify();
    },
    toggleAction(id) {
      let pid = null;
      state.actions = state.actions.map(a => {
        if (a.id !== id) return a;
        pid = a.project;
        return { ...a, done: !a.done };
      });
      persist('actions');
      touchProject(pid);
      notify();
    },
    deleteAction(id) {
      const a = state.actions.find(x => x.id === id);
      state.actions = state.actions.filter(x => x.id !== id);
      persist('actions');
      if (a) touchProject(a.project);
      notify();
    },

    // ─────── Loose tasks ───────
    addLooseTask(input) {
      const t = {
        id: genId('t'),
        title: input.title || '',
        due: input.due || null,
        done: !!input.done,
        tag: input.tag || '',
      };
      state.looseTasks = [...state.looseTasks, t];
      persist('looseTasks');
      notify();
      return t.id;
    },
    updateLooseTask(id, patch) {
      state.looseTasks = state.looseTasks.map(t => t.id === id ? { ...t, ...patch } : t);
      persist('looseTasks');
      notify();
    },
    toggleLooseTask(id) {
      state.looseTasks = state.looseTasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      persist('looseTasks');
      notify();
    },
    deleteLooseTask(id) {
      state.looseTasks = state.looseTasks.filter(t => t.id !== id);
      persist('looseTasks');
      notify();
    },

    // ─────── Kinds (project categories) ───────
    addKind(label) {
      const trimmed = String(label || '').trim();
      if (!trimmed) return null;
      const id = 'k-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      const k = { id, label: trimmed };
      state.kinds = [...state.kinds, k];
      persist('kinds');
      notify();
      return id;
    },
    updateKind(id, label) {
      const trimmed = String(label || '').trim();
      if (!trimmed) return;
      state.kinds = state.kinds.map(k => k.id === id ? { ...k, label: trimmed } : k);
      persist('kinds');
      notify();
    },
    deleteKind(id) {
      state.kinds = state.kinds.filter(k => k.id !== id);
      persist('kinds');
      notify();
    },

    // ─────── Quotes ───────
    setQuotes(arr) {
      state.quotes = Array.isArray(arr) ? arr.slice() : [];
      persist('quotes');
      notify();
    },

    // ─────── Export / Import / Reset ───────
    exportAll() {
      return {
        version: 1,
        exportedAt: nowStamp(),
        projects:   state.projects,
        decisions:  state.decisions,
        notes:      state.notes,
        actions:    state.actions,
        looseTasks: state.looseTasks,
        recent:     state.recent,
        quotes:     state.quotes,
        kinds:      state.kinds,
      };
    },
    importAll(data) {
      if (!data || typeof data !== 'object') throw new Error('数据格式不正确');
      ['projects','decisions','notes','actions','looseTasks','recent','quotes','kinds'].forEach(k => {
        if (Array.isArray(data[k])) {
          state[k] = data[k];
          persist(k);
        }
      });
      notify();
    },
    resetToDefaults() {
      state.projects   = DEFAULT_PROJECTS.slice();
      state.decisions  = DEFAULT_DECISIONS.slice();
      state.notes      = DEFAULT_NOTES.slice();
      state.actions    = DEFAULT_ACTIONS.slice();
      state.looseTasks = DEFAULT_LOOSE_TASKS.slice();
      state.recent     = DEFAULT_RECENT.slice();
      state.quotes     = DEFAULT_QUOTES.slice();
      state.kinds      = DEFAULT_KINDS.slice();
      Object.keys(SK).forEach(k => persist(k));
      notify();
    },
    clearAll() {
      state.projects = []; state.decisions = []; state.notes = [];
      state.actions = []; state.looseTasks = []; state.recent = [];
      // Keep quotes — they're user-customized encouragement, not data
      Object.keys(SK).forEach(k => persist(k));
      notify();
    },
  };
})();

function useStore() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => Store.subscribe(force), []);
  const s = Store.getState();
  const projectMap = React.useMemo(
    () => Object.fromEntries(s.projects.map(p => [p.id, p])),
    [s.projects],
  );
  const kindMap = React.useMemo(
    () => Object.fromEntries((s.kinds || []).map(k => [k.id, k])),
    [s.kinds],
  );
  return {
    projects:   s.projects,
    decisions:  s.decisions,
    notes:      s.notes,
    actions:    s.actions,
    looseTasks: s.looseTasks,
    recent:     s.recent,
    quotes:     s.quotes,
    kinds:      s.kinds,
    projectMap,
    kindMap,
  };
}

// Resolve a kind id to its current label, preferring user-edited kinds and
// falling back to the static defaults so historical projects always render.
function kindLabel(kindId, liveKinds) {
  const arr = Array.isArray(liveKinds) ? liveKinds : Store.getState().kinds || [];
  const hit = arr.find(k => k.id === kindId);
  if (hit) return hit.label;
  if (KIND[kindId]) return KIND[kindId].label;
  return kindId;
}

/* ───────────────────── Gist sync ─────────────────────
   Personal cloud via a GitHub Gist:
     - User generates a Personal Access Token with `gist` scope (one-time).
     - Token + gistId live in localStorage on each device.
     - Push: PATCH the Gist with full exportAll() JSON.
     - Pull: GET the Gist, call importAll() with the contents.
     - Auto-push (optional): subscribe to store changes, debounce 2s, push.
   "Last write wins" — there's no merge. The cloud copy is whatever was
   written most recently. The pulled-or-pushed timestamps are stored so the
   UI can tell the user what happened. */

const SYNC_KEYS = {
  token:    'commandcenter_sync_token',
  gistId:   'commandcenter_sync_gist_id',
  auto:     'commandcenter_sync_auto',
  lastPush: 'commandcenter_sync_last_push',
  lastPull: 'commandcenter_sync_last_pull',
  lastErr:  'commandcenter_sync_last_err',
};

const GistSync = (function () {
  function read(k, fallback) {
    try { const v = localStorage.getItem(k); return v == null ? fallback : v; }
    catch (e) { return fallback; }
  }
  function write(k, v) {
    try { if (v == null || v === '') localStorage.removeItem(k); else localStorage.setItem(k, v); }
    catch (e) {}
  }

  function getConfig() {
    return {
      token:    read(SYNC_KEYS.token, ''),
      gistId:   read(SYNC_KEYS.gistId, ''),
      auto:     read(SYNC_KEYS.auto, '0') === '1',
      lastPush: read(SYNC_KEYS.lastPush, ''),
      lastPull: read(SYNC_KEYS.lastPull, ''),
      lastErr:  read(SYNC_KEYS.lastErr, ''),
    };
  }
  function setConfig(patch) {
    if ('token'  in patch) write(SYNC_KEYS.token,  patch.token);
    if ('gistId' in patch) write(SYNC_KEYS.gistId, patch.gistId);
    if ('auto'   in patch) write(SYNC_KEYS.auto,   patch.auto ? '1' : '0');
    if ('lastPush' in patch) write(SYNC_KEYS.lastPush, patch.lastPush);
    if ('lastPull' in patch) write(SYNC_KEYS.lastPull, patch.lastPull);
    if ('lastErr'  in patch) write(SYNC_KEYS.lastErr,  patch.lastErr || '');
    syncSubs.forEach(fn => { try { fn(getConfig()); } catch (e) {} });
  }

  const syncSubs = new Set();
  function subscribeConfig(fn) { syncSubs.add(fn); return () => syncSubs.delete(fn); }

  function fileName() { return 'commandcenter.json'; }

  async function push() {
    const cfg = getConfig();
    if (!cfg.token) throw new Error('未配置 GitHub Token');
    const payload = Store.exportAll();
    const body = {
      description: 'CommandCenter sync',
      files: { [fileName()]: { content: JSON.stringify(payload, null, 2) } },
    };
    const headers = {
      Authorization: 'Bearer ' + cfg.token,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json',
    };
    let res;
    if (cfg.gistId) {
      res = await fetch('https://api.github.com/gists/' + cfg.gistId, {
        method: 'PATCH', headers, body: JSON.stringify(body),
      });
    } else {
      res = await fetch('https://api.github.com/gists', {
        method: 'POST', headers, body: JSON.stringify({ ...body, public: false }),
      });
    }
    if (!res.ok) {
      const txt = await res.text();
      throw new Error('GitHub ' + res.status + '：' + txt.slice(0, 200));
    }
    const json = await res.json();
    setConfig({
      gistId: json.id || cfg.gistId,
      lastPush: Store.nowStamp(),
      lastErr: '',
    });
    return json.id || cfg.gistId;
  }

  async function pull() {
    const cfg = getConfig();
    if (!cfg.token) throw new Error('未配置 GitHub Token');
    if (!cfg.gistId) throw new Error('还没有 Gist ID — 先推送一次创建云端备份');
    const headers = {
      Authorization: 'Bearer ' + cfg.token,
      Accept: 'application/vnd.github+json',
    };
    const res = await fetch('https://api.github.com/gists/' + cfg.gistId, { headers });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error('GitHub ' + res.status + '：' + txt.slice(0, 200));
    }
    const json = await res.json();
    const file = json.files && json.files[fileName()];
    if (!file) throw new Error('Gist 里没找到 ' + fileName());
    let content = file.content;
    // GitHub truncates very large files; fetch raw_url in that case.
    if (file.truncated && file.raw_url) {
      const raw = await fetch(file.raw_url);
      content = await raw.text();
    }
    const parsed = JSON.parse(content);
    Store.importAll(parsed);
    setConfig({ lastPull: Store.nowStamp(), lastErr: '' });
    return parsed;
  }

  // Auto-push: subscribe to Store changes, debounce pushes by 2s.
  let pendingTimer = null;
  let pendingPromise = null;
  let suppressUntil = 0;

  function maybeAutoPush() {
    const cfg = getConfig();
    if (!cfg.auto || !cfg.token) return;
    // Pull operations call Store.importAll which would re-trigger us; suppress
    // for a short window after every push/pull so we don't ping-pong.
    if (Date.now() < suppressUntil) return;
    if (pendingTimer) clearTimeout(pendingTimer);
    pendingTimer = setTimeout(() => {
      pendingTimer = null;
      pendingPromise = push().catch(e => {
        setConfig({ lastErr: String(e.message || e) });
      }).finally(() => {
        suppressUntil = Date.now() + 1500;
        pendingPromise = null;
      });
    }, 2000);
  }

  // Wrap the Store callbacks so importAll doesn't trigger an immediate push.
  function withSuppression(fn) {
    return (...args) => {
      suppressUntil = Date.now() + 3000;
      return fn(...args);
    };
  }

  function start() {
    Store.subscribe(maybeAutoPush);
  }

  return {
    getConfig, setConfig, subscribeConfig,
    push, pull, start,

// Pick a deterministic item from arr based on the given date string.
// Same date → same pick; different date → likely different pick.
function dailyPick(arr, dateIso) {
  if (!arr || !arr.length) return '';
  let h = 5381;
  const s = String(dateIso || '');
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  }
  return arr[Math.abs(h) % arr.length];
}

// Fuzzy match: every char of token appears in str in order (whitespace ignored).
function fuzzyMatch(token, str) {
  const t = String(token || '').replace(/\s+/g, '').toLowerCase();
  const s = String(str || '').replace(/\s+/g, '').toLowerCase();
  if (!t) return true;
  let i = 0;
  for (const c of s) {
    if (c === t[i]) i++;
    if (i >= t.length) return true;
  }
  return false;
}

function Field({ label, children, hint }) {

}

function TextInput({ value, onChange, placeholder, autoFocus, type = 'text' }) {
  return (
    <input

}

function TextArea({ value, onChange, placeholder, rows = 4 }) {
  return (

}

function Select({ value, onChange, options }) {

}

Object.assign(window, {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-source="today.jsx">
// 指挥台 (Command Center home page)
// Three modules: 项目任务 + 杂事 + 日历

const TODAY = '2026-05-12';

function fmtClock(date, tz) {
  try {
    return new Intl.DateTimeFormat('en-GB', {
      hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz,
    }).format(date);
  } catch (e) {
    return '--:--';
  }
}

const HomeView = ({ openProject }) => {
  const { actions, looseTasks, quotes } = useStore();
  const projectTasks = actions.filter(a => !a.done)
    .sort((a, b) => (a.due || '9').localeCompare(b.due || '9'));
  const looseOpen = looseTasks.filter(t => !t.done).length;

  // Live clock — re-render every 30s so the Beijing time stays current.
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  const todayIso = Store.todayIso();
  const quote = dailyPick(quotes, todayIso) || '今天也是值得期待的一天。';

  return (
    <div className="page">
      {/* Hero */}
      <div className="cmd-hero compact">
        <div style={{ minWidth: 0, flex: 1 }}>
          <h1
            title="鼓励语句 · 每日随机（在「工具」页面里编辑）"
            style={{ cursor: 'default' }}>
            {quote}
          </h1>
          <div className="meta-line">
            <span className="live">实时</span>
            <span style={{ fontWeight: 700, color: 'var(--fg-strong)' }}>
              北京 {fmtClock(now, 'Asia/Shanghai')}
            </span>
            <span>·</span>
            <span>2026 / 05 / 12 · 周二</span>
            <span>·</span>
            <span>第 20 周</span>
          </div>
        </div>
        <div className="hero-stats compact">
          <div className="cell">
            <div className="v">{projectTasks.length}</div>
            <div className="k">项目任务</div>
          </div>
          <div className="cell">
            <div className="v">{looseOpen}</div>
            <div className="k">杂事</div>
          </div>
          <div className="cell">
            <div className="v">{projectTasks.filter(a => a.due === TODAY).length + looseTasks.filter(t => t.due === TODAY && !t.done).length}</div>
            <div className="k">今天到期</div>
          </div>
        </div>
      </div>

      {/* Section 1: tasks (split) */}
      <div className="home-section">
        <div className="home-section-head">
          <h2>任务</h2>
          <span className="desc">项目类 · 杂事类</span>
        </div>
        <div className="home-grid equal">
          <ProjectTasksPanel openProject={openProject} />
          <LooseTasksPanel />
        </div>
      </div>

      {/* Section 2: calendar */}
      <div className="home-section">
        <div className="home-section-head">
          <h2>日历</h2>
          <span className="desc">任务时间安排 · 未来 14 天</span>
        </div>
        <CalendarPanel openProject={openProject} />
      </div>
    </div>
  );
};

/* ──────────────── Project tasks panel ──────────────── */
const ProjectTasksPanel = ({ openProject }) => {
  const { actions, projects, projectMap } = useStore();
  const open = actions.filter(t => !t.done).sort((a, b) => (a.due || '9').localeCompare(b.due || '9'));
  const done = actions.filter(t => t.done);
  const list = [...open, ...done];

  const addPrompt = () => {
    if (projects.length === 0) {
      openModal(<Modal title="提示" onClose={closeModal}><div style={{ fontSize: 13 }}>请先新建一个项目。</div></Modal>);
      return;
    }
    openModal(<ActionFormModal />);
  };

  return (
    <div className="panel">
      <div className="panel-head">
        <h2>
          <I.Flag size={14} />
          项目任务
          <span className="pcount">{open.length} 项 · 来自项目</span>
        </h2>
        <button className="btn ghost sm" onClick={addPrompt}><I.Plus size={11} /> 加一条</button>
      </div>
      <div className="panel-body">
        {list.length === 0 && (
          <div style={{ padding: '20px 16px', color: 'var(--fg-faint)', fontSize: 13 }}>
            暂无项目任务。点击右上角「加一条」开始。
          </div>
        )}
        {list.map(a => {
          const p = projectMap[a.project];
          if (!p) return null;
          const overdue = a.due && a.due < TODAY && !a.done;
          const isToday = a.due === TODAY;
          return (
            <div
              key={a.id}
              className={`action-row ${a.done ? 'done' : ''}`}
              style={{ cursor: 'default' }}
            >
              <div
                className={`cb ${a.done ? 'checked' : ''}`}
                onClick={() => Store.toggleAction(a.id)}
                title={a.done ? '标记为未完成' : '标记为完成'}
              >
                <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" /></svg>
              </div>
              <span
                className="code"
                style={{ width: 56, flexShrink: 0, cursor: 'pointer' }}
                onClick={() => openProject(p.id)}
                title={`打开 ${p.name}`}>
                {p.code}
              </span>
              <span
                className="title"
                style={{ cursor: 'pointer' }}
                onClick={() => openProject(p.id)}
                title={`打开 ${p.name}`}>
                {a.title}
              </span>
              {a.waitingOn === 'external' && <span className="chip steel">外部</span>}
              {a.waitingOn === 'team' && <span className="chip dim">团队</span>}
              {a.waitingOn === 'me' && <span className="chip amber">ME</span>}
              <span className={`due ${overdue ? 'overdue' : ''} ${isToday ? 'today' : ''}`}>
                {fmtDue(a.due, TODAY)}
              </span>
              <RowMenu
                onEdit={() => openModal(<ActionFormModal actionId={a.id} />)}
                onDelete={() => openModal(<ConfirmDialog
                  title="删除行动项"
                  message={`确认删除"${a.title}"？`}
                  confirmLabel="删除" danger
                  onConfirm={() => Store.deleteAction(a.id)}
                  onClose={closeModal}
                />)}
              />
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ──────────────── Loose tasks panel ──────────────── */
const LooseTasksPanel = () => {
  const { looseTasks } = useStore();
  const open = looseTasks.filter(t => !t.done);
  const done = looseTasks.filter(t => t.done);
  const sorted = [...open.sort((a, b) => {
    if (!a.due) return 1; if (!b.due) return -1;
    return a.due.localeCompare(b.due);
  }), ...done];

  return (
    <div className="panel">
      <div className="panel-head">
        <h2>
          <I.Check size={14} />
          杂事
          <span className="pcount">{open.length} 项 · 不属于任何项目</span>
        </h2>
        <button className="btn ghost sm" onClick={() => openModal(<LooseTaskFormModal />)}>
          <I.Plus size={11} /> 加一条
        </button>
      </div>
      <div className="panel-body">
        {sorted.length === 0 && (
          <div style={{ padding: '20px 16px', color: 'var(--fg-faint)', fontSize: 13 }}>
            暂无杂事。
          </div>
        )}
        {sorted.map(t => {
          const overdue = t.due && t.due < TODAY && !t.done;
          const isToday = t.due === TODAY;
          return (
            <div key={t.id} className={`loose-row ${t.done ? 'done' : ''}`} onClick={() => Store.toggleLooseTask(t.id)}>
              <div className={`cb ${t.done ? 'checked' : ''}`}>
                <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" /></svg>
              </div>
              <span className="title">{t.title}</span>
              {t.tag && <span className="tag">{t.tag}</span>}
              <span className={`due ${overdue ? 'overdue' : ''} ${isToday ? 'today' : ''} ${!t.due ? 'someday' : ''}`}>
                {!t.due ? '有空' : fmtDue(t.due, TODAY)}
              </span>
              <RowMenu
                onEdit={(e) => { e.stopPropagation(); openModal(<LooseTaskFormModal taskId={t.id} />); }}
                onDelete={(e) => {
                  e.stopPropagation();
                  openModal(<ConfirmDialog
                    title="删除杂事"
                    message={`确认删除"${t.title}"？`}
                    confirmLabel="删除" danger
                    onConfirm={() => Store.deleteLooseTask(t.id)}
                    onClose={closeModal}
                  />);
                }}
              />
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ──────────────── Inline row menu (⋯) ──────────────── */
const RowMenu = ({ onEdit, onDelete }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    window.addEventListener('mousedown', onDoc);
    return () => window.removeEventListener('mousedown', onDoc);
  }, [open]);

  return (
    <span ref={ref} style={{ position: 'relative', marginLeft: 4, flexShrink: 0 }}>
      <button
        onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}
        title="操作"
        style={{
          appearance: 'none', border: 'none', background: 'transparent',
          color: 'var(--fg-faint)', cursor: 'pointer',
          width: 22, height: 22, borderRadius: 4,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        }}
        onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-hover)'}
        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
      >
        <I.More size={13} />
      </button>
      {open && (
        <div style={{
          position: 'absolute', right: 0, top: '100%', marginTop: 2,
          background: 'var(--bg-elev)', border: '1px solid var(--line)',
          borderRadius: 6, padding: 4, minWidth: 100,
          boxShadow: '0 4px 14px rgba(0,0,0,0.12)',
          zIndex: 50, fontSize: 12,
        }}>
          <div onClick={(e) => { setOpen(false); onEdit && onEdit(e); }}
               style={{ padding: '6px 10px', cursor: 'pointer', color: 'var(--fg)', borderRadius: 4 }}
               onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-hover)'}

/* ──────────────── Calendar panel (month grid) ──────────────── */

const LUNAR = {
  '2026-04-27': '十一', '2026-04-28': '十二', '2026-04-29': '十三', '2026-04-30': '十四',
  '2026-05-01': '劳动节', '2026-05-02': '十六', '2026-05-03': '十七', '2026-05-04': '十八',
  '2026-05-05': '立夏', '2026-05-06': '二十', '2026-05-07': '廿一', '2026-05-08': '廿二',
  '2026-05-09': '廿三', '2026-05-10': '廿四', '2026-05-11': '廿五', '2026-05-12': '廿六',
  '2026-05-13': '廿七', '2026-05-14': '廿八', '2026-05-15': '廿九', '2026-05-16': '三十',
  '2026-05-17': '四月', '2026-05-18': '初二', '2026-05-19': '初三', '2026-05-20': '初四',
  '2026-05-21': '小满', '2026-05-22': '初六', '2026-05-23': '初七', '2026-05-24': '初八',
  '2026-05-25': '初九', '2026-05-26': '初十', '2026-05-27': '十一', '2026-05-28': '十二',
  '2026-05-29': '十三', '2026-05-30': '十四', '2026-05-31': '十五',
  '2026-06-01': '十六', '2026-06-02': '十七', '2026-06-03': '十八', '2026-06-04': '十九',
  '2026-06-05': '芒种', '2026-06-06': '廿一', '2026-06-07': '廿二',
};
const HOLIDAYS = new Set(['2026-05-01', '2026-05-05', '2026-05-21', '2026-06-05']);

const fmtIso = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const CalendarPanel = ({ openProject }) => {
  const { actions, looseTasks, projectMap } = useStore();
  const [cursor, setCursor] = React.useState({ y: 2026, m: 5 }); // 1-indexed month
  const [selected, setSelected] = React.useState(TODAY);

  // Bucket tasks by due date
  const byDate = React.useMemo(() => {
    const map = {};
    actions.filter(a => !a.done && a.due).forEach(a => {
      (map[a.due] = map[a.due] || []).push({ kind: 'project', ...a });
    });
    looseTasks.filter(t => !t.done && t.due).forEach(t => {
      (map[t.due] = map[t.due] || []).push({ kind: 'loose', ...t });
    });
    return map;
  }, [actions, looseTasks]);

  // Build a 6-week grid starting from Monday of the week containing day 1
  const first = new Date(cursor.y, cursor.m - 1, 1);
  // JS getDay: 0=Sun..6=Sat. We want Mon-first. Monday offset:
  const startOffset = (first.getDay() + 6) % 7;
  const gridStart = new Date(first);
  gridStart.setDate(1 - startOffset);

  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const iso = fmtIso(d);
    cells.push({
      iso,
      day: d.getDate(),
      inMonth: d.getMonth() === cursor.m - 1,
      isToday: iso === TODAY,
      isWeekend: d.getDay() === 0 || d.getDay() === 6,
      lunar: LUNAR[iso] || '',
      isHoliday: HOLIDAYS.has(iso),
      tasks: byDate[iso] || [],
    });
  }

  const move = (dir) => {
    let { y, m } = cursor;
    m += dir;
    if (m < 1) { m = 12; y--; }
    if (m > 12) { m = 1; y++; }
    setCursor({ y, m });
  };

  const selectedTasks = byDate[selected] || [];
  const selectedDate = new Date(selected + 'T00:00:00');
  const selectedLabel = selected === TODAY
    ? `今天 · ${cursor.y}年${selectedDate.getMonth()+1}月${selectedDate.getDate()}日`
    : `${selectedDate.getFullYear()}年${selectedDate.getMonth()+1}月${selectedDate.getDate()}日`;

  return (
    <div className="panel calendar-panel">
      <div className="cal-month-head">
        <div className="cal-title">{cursor.y}年{cursor.m}月</div>
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={() => move(-1)} aria-label="上个月">
            <svg viewBox="0 0 24 24"><path d="M6 15l6-6 6 6" /></svg>
          </button>
          <button className="cal-nav-btn" onClick={() => move(1)} aria-label="下个月">
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" /></svg>
          </button>
          <button className="btn ghost sm" onClick={() => { setCursor({ y: 2026, m: 5 }); setSelected(TODAY); }}>今天</button>
        </div>
      </div>

      <div className="cal-grid">
        <div className="cal-weekdays">
          {['一','二','三','四','五','六','日'].map(w => (
            <div key={w} className={`cal-wd ${w === '六' || w === '日' ? 'we' : ''}`}>{w}</div>
          ))}
        </div>
        <div className="cal-cells">
          {cells.map(c => (
            <div
              key={c.iso}
              className={[
                'cal-cell',
                c.inMonth ? '' : 'out',
                c.isToday ? 'today' : '',
                c.iso === selected ? 'selected' : '',
                c.isWeekend ? 'we' : '',
                c.tasks.length ? 'has-tasks' : '',
              ].join(' ')}
              onClick={() => setSelected(c.iso)}
            >
              <div className="d-num">{c.day}</div>
              <div className={`d-lun ${c.isHoliday ? 'holiday' : ''}`}>{c.lunar || ' '}</div>
              {c.tasks.length > 0 && (
                <div className="d-dots">
                  {c.tasks.slice(0, 3).map((t, i) => (
                    <span key={i} className={`dot ${t.kind}`} />
                  ))}
                  {c.tasks.length > 3 && <span className="dot more">+{c.tasks.length - 3}</span>}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="cal-detail">
        <div className="cal-detail-head">
          <span className="lbl">{selectedLabel}</span>
          <span className="count">{selectedTasks.length} 项任务</span>
        </div>
        <div className="cal-detail-body">
          {selectedTasks.length === 0 ? (
            <div className="cal-empty">这一天没有安排</div>
          ) : (
            selectedTasks.map(item => (
              <CalRow key={item.kind + item.id} item={item} openProject={openProject} projectMap={projectMap} />
            ))
          )}
        </div>
      </div>
    </div>
  );
};

const CalRow = ({ item, openProject, projectMap }) => {
  if (item.kind === 'project') {
    const p = projectMap[item.project];
    if (!p) return null;
    return (
      <div className="cal-row" onClick={() => openProject(p.id)}>
        <span className={`cal-tag proj`}>项目</span>
        <span className="code">{p.code}</span>
        <span className="title">{item.title}</span>
        {item.waitingOn === 'me' && <span className="chip amber sm">ME</span>}
        {item.waitingOn === 'external' && <span className="chip steel sm">外部</span>}
        {item.waitingOn === 'team' && <span className="chip dim sm">团队</span>}
      </div>
    );
  }
  return (
    <div className="cal-row">
      <span className={`cal-tag loose`}>杂事</span>
      <span className="title">{item.title}</span>
      {item.tag && <span className="chip dim sm">{item.tag}</span>}
    </div>
  );
};

function fmtDue(due, today) {
  if (!due) return '—';
  if (due === today) return '今日';
  if (due < today) {
    const d1 = new Date(today), d2 = new Date(due);
    const days = Math.round((d1 - d2) / 86400000);
    return `超期 ${days} 天`;
  }
  const d1 = new Date(today), d2 = new Date(due);
  const days = Math.round((d2 - d1) / 86400000);
  if (days === 1) return '明日';
  if (days <= 7) return `${days} 天后`;
  return due.slice(5);
}

window.RowMenu = RowMenu;
window.fmtDue = fmtDue;

  const kindMissing = !kindOptions.some(k => k.id === form.kind);

      footer={

              />)}>
              删除项目

              管理

          </span>

        </Field>
        <Field label="优先级" hint={form.priority === 'high' ? '高优 → 自动置顶 + 红标' : null}>
          <Select value={form.priority} onChange={(v) => set('priority', v)}
                  options={[

                    { value: 'low', label: '低' },
                  ]} />
        </Field>
        <Field label="等待方">

/* ─────────── Cloud sync (GitHub Gist) ─────────── */
const SyncSettingsModal = () => {
  const cfg = useSyncConfig();
  const [token, setToken] = React.useState(cfg.token || '');
  const [gistId, setGistId] = React.useState(cfg.gistId || '');
  const [auto, setAuto] = React.useState(!!cfg.auto);
  const [busy, setBusy] = React.useState(null); // 'push' | 'pull' | null
  const [msg, setMsg] = React.useState(null);

  const saveConfig = (patch) => {
    GistSync.setConfig(patch);
  };

  const doPush = async () => {
    // Persist edits first so push uses the latest values.
    saveConfig({ token: token.trim(), gistId: gistId.trim() });
    setBusy('push'); setMsg(null);
    try {
      const id = await GistSync.push();
      setGistId(id || '');
      setMsg({ ok: true, text: '已推送到云端' });
    } catch (e) {
      setMsg({ ok: false, text: String(e.message || e) });
    } finally {
      setBusy(null);
    }
  };

  const doPull = async () => {
    saveConfig({ token: token.trim(), gistId: gistId.trim() });
    setBusy('pull'); setMsg(null);
    try {
      await GistSync.pull();
      setMsg({ ok: true, text: '已从云端拉取并覆盖本机' });
    } catch (e) {
      setMsg({ ok: false, text: String(e.message || e) });
    } finally {
      setBusy(null);
    }
  };

  const toggleAuto = (v) => {
    setAuto(v);
    saveConfig({ token: token.trim(), gistId: gistId.trim(), auto: v });
  };

  return (
    <Modal
      title="云端同步 · GitHub Gist"
      onClose={closeModal}
      width={520}
      footer={
        <>
          <button className="btn sm" onClick={closeModal}>关闭</button>
        </>
      }>
      <div style={{
        fontSize: 12.5, lineHeight: 1.7, color: 'var(--fg-muted)',
        padding: '10px 12px', marginBottom: 14,
        border: '1px solid var(--line)', borderRadius: 6, background: 'var(--bg)',
      }}>
        手机和电脑同步用法：
        <div style={{ marginTop: 6 }}>
          1. 去 <a href="https://github.com/settings/tokens/new?scopes=gist&description=CommandCenter" target="_blank" rel="noopener" style={{ color: 'var(--accent)' }}>github.com/settings/tokens</a> 生成一个 Token（勾选 <code style={{ background: 'var(--bg-hover)', padding: '0 4px', borderRadius: 3 }}>gist</code> 权限）
        </div>
        <div>2. 把 Token 粘进下面，点「推送到云端」→ 自动创建一个私有 Gist</div>
        <div>3. 在另一台设备（手机 / 另一台电脑）打开本页，粘同一个 Token + Gist ID，点「从云端拉取」</div>
        <div style={{ marginTop: 6, color: 'var(--fg-faint)' }}>说明：Token 仅存在你这台设备的 localStorage 里，不会上传到任何第三方服务器。同步策略是"最后写入获胜"，没有合并。</div>
      </div>

      <Field label="GitHub Token" hint="一次性生成，只勾 gist 权限即可">
        <TextInput value={token} onChange={setToken} placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxx" />
      </Field>
      <Field label="Gist ID" hint="首次推送会自动创建并填回这里；另一端粘进来即可拉取">
        <TextInput value={gistId} onChange={setGistId} placeholder="留空 = 首次推送自动创建" />
      </Field>

      <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '14px 0' }}>
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer' }}>
          <input
            type="checkbox"
            checked={auto}
            onChange={(e) => toggleAuto(e.target.checked)}
            style={{ width: 16, height: 16 }}
          />
          <span>保存后自动推送（2 秒防抖）</span>
        </label>
      </div>

      <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
        <button
          className="btn primary sm"
          disabled={!token || busy != null}
          onClick={doPush}
          style={{ opacity: (!token || busy != null) ? 0.5 : 1 }}>
          {busy === 'push' ? '推送中…' : '推送到云端'}
        </button>
        <button
          className="btn sm"
          disabled={!token || !gistId || busy != null}
          onClick={() => openModal(<ConfirmDialog
            title="从云端覆盖本机数据"
            message="拉取后本机当前数据会被云端版本完全覆盖。确认继续？"
            confirmLabel="覆盖" danger
            onConfirm={doPull}
            onClose={() => openModal(<SyncSettingsModal />)}
          />)}
          style={{ opacity: (!token || !gistId || busy != null) ? 0.5 : 1 }}>
          {busy === 'pull' ? '拉取中…' : '从云端拉取'}
        </button>
      </div>

      {msg && (
        <div style={{
          marginTop: 12, padding: '8px 12px', borderRadius: 6, fontSize: 12.5,
          color: msg.ok ? 'var(--moss)' : 'var(--rust)',
          background: msg.ok ? 'rgba(110,163,106,0.10)' : 'rgba(178,80,60,0.08)',
          border: '1px solid ' + (msg.ok ? 'rgba(110,163,106,0.25)' : 'rgba(178,80,60,0.20)'),
        }}>{msg.text}</div>
      )}

      <div style={{
        marginTop: 14, fontFamily: 'var(--font-mono)', fontSize: 11,
        color: 'var(--fg-faint)', display: 'flex', flexDirection: 'column', gap: 4,
      }}>
        <div>最近推送：{cfg.lastPush || '—'}</div>
        <div>最近拉取：{cfg.lastPull || '—'}</div>
        {cfg.lastErr && <div style={{ color: 'var(--rust)' }}>上次错误：{cfg.lastErr}</div>}
      </div>
    </Modal>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   PROJECTS LIST
   ════════════════════════════════════════════════════════════════════════ */
const ProjectsView = ({ openProject }) => {
  const { projects, actions, notes, kinds } = useStore();
  // Sort order:
  //   1. Active projects before done/parked.
  //   2. Within each group, priority=high pinned to top.
  //   3. Then by lastUpdate desc.
  const sorted = [...projects].sort((a, b) => {
    const aDone = a.stage === 'done' || a.stage === 'parked';
    const bDone = b.stage === 'done' || b.stage === 'parked';
    if (aDone !== bDone) return aDone ? 1 : -1;
    const aHi = a.priority === 'high';
    const bHi = b.priority === 'high';
    if (aHi !== bHi) return aHi ? -1 : 1;
    return a.lastUpdate < b.lastUpdate ? 1 : -1;
  });

  const [expanded, setExpanded] = React.useState(() => new Set([sorted[0]?.id].filter(Boolean)));
  const toggle = (id) => setExpanded(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const active = projects.filter(p => p.stage !== 'done' && p.stage !== 'parked').length;

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <h1>项目</h1>
          <div className="sub">{projects.length} 总计 · {active} 推进中 · 按最近更新排序</div>
        </div>
        <div className="right">
          <button className="btn"><I.Filter size={12} /> 筛选</button>
          <button className="btn primary" onClick={() => openModal(<ProjectFormModal />)}>
            <I.Plus size={12} /> 新建项目
          </button>
        </div>
      </div>

      <div className="project-list">
        {sorted.length === 0 && (
          <div style={{ padding: 24, color: 'var(--fg-faint)', fontSize: 13, textAlign: 'center' }}>
            还没有项目。点击右上角「新建项目」开始。
          </div>
        )}
        {sorted.map(p => {
          const isOpen = expanded.has(p.id);
          const isDormant = p.stage === 'done' || p.stage === 'parked';
          // Show all actions (done + undone). Done sinks to the bottom and is
          // rendered with strikethrough so the user can re-check it off if needed.
          const pActionsAll = actions.filter(a => a.project === p.id);
          const pActionsOpen = pActionsAll.filter(a => !a.done);
          const pActionsDone = pActionsAll.filter(a => a.done);
          const pActionsDisplay = [...pActionsOpen, ...pActionsDone];
          const pNotes = notes.filter(n => n.project === p.id);
          return (
            <div key={p.id} className={`pl-item ${isOpen ? 'open' : ''} ${isDormant ? 'dormant' : ''}`}>
              <div className="pl-head" onClick={() => toggle(p.id)}>
                <span className={`pl-caret ${isOpen ? 'open' : ''}`}>
                  <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" /></svg>
                </span>
                <span className="code">{p.code}</span>
                <span className="pl-name">{p.name}</span>
                {p.priority === 'high' && !isDormant && (
                  <span className="chip rust" title="高优先级">高优</span>
                )}
                <span className="chip dim">{kindLabel(p.kind, kinds)}</span>
                {p.waitingOn === 'me' && !isDormant && <span className="chip amber">等我</span>}
                {p.stuckDays >= 5 && !isDormant && <span className="chip rust">卡 {p.stuckDays}d</span>}
                {isDormant && <span className="chip dim">{STAGE[p.stage].label}</span>}
                <div className="pl-spacer" />
                <span className="pl-meta">{pActionsOpen.length} 待办 / {pActionsAll.length} 任务 · {pNotes.length} 笔记</span>
                <span className="pl-meta mono">更新 {p.lastUpdate.slice(5, 10)}</span>
                {p.deadline && <span className="pl-meta mono">截止 {p.deadline.slice(5)}</span>}
              </div>

              {isOpen && (
                <div className="pl-body">
                  <div className="pl-summary">{p.summary}</div>

                  <div className="pl-grid">
                    <div className="pl-block">
                      <div className="pl-block-h">行动项</div>
                      {pActionsDisplay.length === 0 ? (
                        <div className="pl-empty">无行动项</div>
                      ) : pActionsDisplay.slice(0, 6).map(a => (
                        <div
                          key={a.id}
                          className="pl-mini-row"
                          style={{ alignItems: 'center', display: 'flex', gap: 8 }}
                          onClick={(e) => e.stopPropagation()}>
                          <InlineCheckbox
                            checked={a.done}
                            priorityHigh={a.priority === 'high'}
                            onClick={() => Store.toggleAction(a.id)}
                          />
                          <span
                            className="t"
                            style={a.done
                              ? { flex: 1, minWidth: 0, textDecoration: 'line-through', color: 'var(--fg-faint)' }
                              : { flex: 1, minWidth: 0 }}>
                            {a.title}
                          </span>
                          <span className="d mono" style={a.done ? { color: 'var(--fg-faint)' } : null}>
                            {a.due ? a.due.slice(5) : '—'}
                          </span>
                          <button
                            className="btn ghost sm"
                            title="为此行动项记一条笔记"
                            onClick={() => openModal(<NoteFormModal projectId={p.id} linkedTo={{ kind: 'action', id: a.id }} />)}
                            style={{ padding: '2px 6px', fontSize: 11 }}>
                            <I.Plus size={10} /> 记一条
                          </button>
                          <button
                            className="btn ghost sm"
                            title="编辑"
                            onClick={() => openModal(<ActionFormModal actionId={a.id} />)}
                            style={{ padding: '2px 6px', fontSize: 11 }}>
                            编辑
                          </button>
                        </div>
                      ))}
                    </div>
                    <div className="pl-block">
                      <div className="pl-block-h">最近笔记</div>
                      {pNotes.length === 0 && <div className="pl-empty">无</div>}
                      {pNotes.slice(0, 4).map(n => (
                        <div key={n.id} className="pl-mini-row">
                          <span className={`nkind ${n.kind}`} style={{ marginRight: 6 }}>{n.kind}</span>
                          <span className="t">{n.title}</span>
                          <span className="d mono">{n.when.slice(5, 10)}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pl-actions">
                    <button className="btn primary sm" onClick={(e) => { e.stopPropagation(); openProject(p.id); }}>
                      查看详情 →
                    </button>
                    <button className="btn sm" onClick={(e) => { e.stopPropagation(); openModal(<NoteFormModal projectId={p.id} />); }}>
                      <I.Plus size={11} /> 记一条
                    </button>
                    <button className="btn sm" onClick={(e) => { e.stopPropagation(); openModal(<ActionFormModal projectId={p.id} />); }}>
                      <I.Flag size={11} /> 加行动项
                    </button>
                    <button className="btn ghost sm" style={{ marginLeft: 'auto' }} onClick={(e) => { e.stopPropagation(); openModal(<ProjectFormModal projectId={p.id} />); }}>
                      编辑
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

function noteKindColor(kind, line, bg) {
  const map = {
    meeting:  ['var(--steel)',  'rgba(111,140,176,0.30)', 'rgba(111,140,176,0.10)'],
    insight:  ['var(--moss)',   'rgba(110,163,106,0.30)', 'rgba(110,163,106,0.10)'],
    research: ['var(--violet)', 'rgba(158,138,196,0.30)', 'rgba(158,138,196,0.10)'],
    decision: ['var(--amber)',  'rgba(210,138,58,0.30)',  'rgba(210,138,58,0.10)'],
  };
  const v = map[kind] || ['var(--fg-muted)', 'var(--line)', 'transparent'];
  if (line) return v[1];
  if (bg)   return v[2];
  return v[0];
}

const NotesView = ({ openProject }) => {
  const { notes, projectMap, projects } = useStore();
  const byProject = {};
  notes.forEach(n => {
    if (!byProject[n.project]) byProject[n.project] = [];
    byProject[n.project].push(n);
  });
  Object.values(byProject).forEach(arr => arr.sort((a, b) => (a.when < b.when ? 1 : -1)));

  const projIds = Object.keys(byProject).sort((a, b) => {
    const la = byProject[a][0].when;
    const lb = byProject[b][0].when;
    return la < lb ? 1 : -1;
  });

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <h1>笔记</h1>
          <div className="sub">{notes.length} 条 · 跨 {projIds.length} 个项目 · 写在项目里，自动汇总到此</div>
        </div>
        <div className="right">
          <button className="btn"><I.Filter size={12} /> 类型</button>
          <button className="btn"><I.Search size={12} /> 搜索</button>
          <button className="btn primary" onClick={() => {
            if (projects.length === 0) return;
            openModal(<NoteFormModal />);
          }}>
            <I.Plus size={12} /> 新建笔记
          </button>
        </div>
      </div>

      <div className="notes-grid">
        {projIds.length === 0 && (
          <div style={{ padding: 24, color: 'var(--fg-faint)', fontSize: 13, textAlign: 'center' }}>
            还没有笔记。
          </div>
        )}
        {projIds.map(pid => {
          const p = projectMap[pid];
          if (!p) return null;
          return (
            <div key={pid} className="notes-project-section">
              <div className="nps-head" onClick={() => openProject(pid)} style={{ cursor: 'pointer' }}>
                <span style={{
                  width: 8, height: 8, borderRadius: '50%',
                  background: stageColor(p.stage),
                }} />
                <span className="pcode">{p.code}</span>
                <span className="pname">{p.name}</span>
                <span className="chip dim" style={{ marginLeft: 8 }}>{STAGE[p.stage].label}</span>
                <span className="pcount">{byProject[pid].length} 条笔记</span>
              </div>
              <div>
                {byProject[pid].map(n => (
                  <div key={n.id} className="note-item">
                    <div className="nh">
                      <span className={`nkind ${n.kind}`}>{n.kind}</span>
                      <span className="ntitle">{n.title}</span>
                      <LinkedBadge note={n} />
                      <span className="when">{n.when}</span>
                      <RowMenu
                        onEdit={() => openModal(<NoteFormModal noteId={n.id} />)}
                        onDelete={() => openModal(<ConfirmDialog
                          title="删除笔记" message={`确认删除"${n.title}"？`}
                          confirmLabel="删除" danger
                          onConfirm={() => Store.deleteNote(n.id)} onClose={closeModal}
                        />)}
                      />
                    </div>
                    <div className="nbody">{n.body}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════════════════ */
const ToolsView = () => {
  const fileRef = React.useRef(null);

  const doExport = () => {
    const data = Store.exportAll();
    const text = JSON.stringify(data, null, 2);
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `commandcenter-backup-${Store.todayIso()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const doImport = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        openModal(<ConfirmDialog
          title="导入备份"
          message="导入会覆盖当前所有数据（项目 / 笔记 / 行动项 / 杂事）。确认继续？"
          confirmLabel="导入并覆盖" danger
          onConfirm={() => {
            try { Store.importAll(data); }
            catch (e) { window.alert('导入失败：' + (e.message || e)); }
          }}
          onClose={closeModal}
        />);
      } catch (e) {
        window.alert('JSON 解析失败：' + e.message);
      }
    };
    reader.readAsText(file);
  };

  const doReset = () => {
    openModal(<ConfirmDialog
      title="恢复示例数据"
      message="当前所有数据会被丢弃，恢复到内置的示例数据。"
      confirmLabel="恢复" danger
      onConfirm={() => Store.resetToDefaults()}
      onClose={closeModal}
    />);
  };

  const doClear = () => {
    openModal(<ConfirmDialog
      title="清空全部数据"
      message="所有项目、笔记、行动项、杂事都会被清空，无法恢复。"
      confirmLabel="清空" danger
      onConfirm={() => Store.clearAll()}
      onClose={closeModal}
    />);
  };

  const tools = [
    {
      icon: 'External', title: '云端同步 · Gist',
      desc: '用一个私有 GitHub Gist 当云盘。手机和电脑配同一个 Token + Gist ID 就能互相同步。',
      tag: '配置同步', onClick: () => openModal(<SyncSettingsModal />),
    },
    {
      icon: 'Sparkle', title: '鼓励语句',
      desc: '每天在指挥台首页随机显示一条。点开可以加 / 减 / 改语句，每行一条。',

    {
      icon: 'Folder', title: '项目类别',
      desc: '管理新建项目时可选的类别。可加、可改、可删；已使用的类别删除时会提示。',
      tag: '编辑类别', onClick: () => openModal(<KindsEditorModal />),
    },
    { icon: 'Sparkle', title: '从 Claude 对话批量导入', desc: '把对话里的"建议项 / 任务清单"粘贴进来，结构化后一键导入到对应项目。', tag: '已配置' },
    { icon: 'Upload',  title: 'AI 总结导出', desc: '把指定项目 / 时间段的笔记 + 行动项打包成结构化报告，复制给 Claude 做进度分析或下一步建议。', tag: '常用' },

  return (

        onChange={(e) => {
          const f = e.target.files && e.target.files[0];

      <div className="tools-grid">
        {tools.map((t, i) => {
